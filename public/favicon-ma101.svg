<svg xmlns="http://www.w3.org/2000/svg" viewBox="1 3 60 58" width="64" height="64">
  <!-- === 蒼瀾龍 (Azure / Plesiosaur) in MA101 teal === -->

  <!-- Tail -->
  <path d="M11 42 Q7 40 5 36 Q4.5 34 6.5 35" stroke="#0E7C86" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Body (turtle-like) -->
  <ellipse cx="24" cy="43" rx="16" ry="9" fill="#0E7C86"/>
  <!-- Shell highlight -->
  <ellipse cx="24" cy="39" rx="12" ry="3" fill="#2A9DA6" opacity="0.4"/>
  <!-- Belly -->
  <ellipse cx="24" cy="46" rx="11" ry="5" fill="#7DD3D9"/>

  <!-- Flippers (front pair) -->
  <path d="M34 44 Q40 50 44 54 Q41 54 37 50 Q35 48 34 46" fill="#0A5C63"/>
  <!-- Flippers (back pair) -->
  <path d="M14 44 Q8 50 4 54 Q7 54 11 50 Q13 48 14 46" fill="#0A5C63"/>
  <!-- Smaller rear flippers -->
  <path d="M30 47 Q34 53 36 56 Q34 56 32 52 Q31 50 30 48" fill="#084B51"/>
  <path d="M18 47 Q14 53 12 56 Q14 56 16 52 Q17 50 18 48" fill="#084B51"/>

  <!-- Long neck curving up -->
  <path d="M36 40 C40 36, 41 28, 43 22 C44 18, 45 14, 46 11" stroke="#0E7C86" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Neck belly highlight -->
  <path d="M38 40 C42 35, 43 27, 45 21 C46 17, 46.5 14, 47.5 11" stroke="#7DD3D9" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Head -->
  <ellipse cx="48" cy="10" rx="7" ry="5" fill="#0E7C86" transform="rotate(15 48 10)"/>

  <!-- Eye -->
  <circle cx="50" cy="8" r="2.8" fill="white"/>
  <circle cx="51" cy="7.5" r="1.8" fill="#1D2B3A"/>
  <circle cx="51.8" cy="6.8" r="0.7" fill="white"/>

  <!-- Smile -->
  <path d="M52 12 Q54 14 56 12" stroke="#0A5C63" stroke-width="0.8" fill="none" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <circle cx="53" cy="10" r="1.5" fill="#7DD3D9" opacity="0.45"/>

  <!-- Water bubbles -->
  <circle cx="54" cy="16" r="1" fill="#7DD3D9" opacity="0.5"/>
  <circle cx="57" cy="12" r="0.7" fill="#7DD3D9" opacity="0.4"/>
  <circle cx="38" cy="8" r="1" fill="#7DD3D9" opacity="0.45"/>

  <!-- Forest plot diamond (MA symbol) on body -->
  <polygon points="24,38 28,43 24,48 20,43" fill="#FFD93D" stroke="white" stroke-width="0.8" opacity="0.85"/>
</svg>
